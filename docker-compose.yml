services:
  postgres:
    image: postgres:16
    container_name: bigdata_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bigdata_lab
    ports:
      - "5433:5432"
    volumes:
      - ./init/01_postgres.sql:/docker-entrypoint-initdb.d/01_postgres.sql
      - ./init/load.sh:/docker-entrypoint-initdb.d/load.sh
      - ./data:/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.3.13.40
    container_name: bigdata_clickhouse
    restart: always
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./init/02_clickhouse.sql:/docker-entrypoint-initdb.d/02_clickhouse.sql

  spark:
    image: apache/spark:3.5.1-python3
    container_name: bigdata_spark
    restart: always
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./spark_jobs:/opt/spark_jobs
      - ./jars:/opt/spark_jars
    depends_on:
      - postgres
      - clickhouse
